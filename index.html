<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Explorer</title>
    <link rel="stylesheet" href="./node_modules/cesium/Build/Cesium/Widgets/widgets.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="globe-panel">
        <div id="globe-container" aria-label="Interactive 3D globe"></div>

        <section id="table-view" class="table-view" hidden>
          <div class="table-head">
            <h3>Location CSV Files</h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>File</th>
                  <th>Size (bytes)</th>
                  <th>Modified (UTC)</th>
                </tr>
              </thead>
              <tbody id="files-table-body"></tbody>
            </table>
          </div>
        </section>

        <section id="logs-view" class="logs-view" hidden>
          <h3>Application Logs</h3>
          <pre id="debug-log" class="debug-log" aria-live="polite">[boot] waiting...</pre>
        </section>

        <div class="hud">
          <h1>Earth Explorer</h1>
          <p>Drag to rotate, scroll/pinch to zoom to street level.</p>
        </div>
        <div class="map-attribution">
          &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap contributors</a>
        </div>
        <div id="fatal-error" class="fatal-error" hidden></div>
      </section>

      <aside class="chat-panel" aria-label="Location chat interface">
        <header class="chat-header">
          <h2>Navigator</h2>
          <p>
            Try: <code>/show Paris</code>, <code>/list</code>, <code>/view sample.csv</code>,
            <code>/logs</code>
          </p>
        </header>

        <section id="chat-log" class="chat-log" aria-live="polite"></section>

        <form id="chat-form" class="chat-form">
          <input
            id="chat-input"
            type="text"
            name="command"
            placeholder="Type an instruction..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </aside>
    </main>

    <script defer src="./boot.js"></script>
  </body>
</html>
